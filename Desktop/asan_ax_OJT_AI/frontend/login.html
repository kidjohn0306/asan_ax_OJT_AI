<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OJT 평가 시스템 — 로그인</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1e3a5f;
      --accent: #3b82f6;
      --danger: #ef4444;
      --bg: #f1f5f9;
      --text: #1e293b;
      --sub: #64748b;
      --border: #e2e8f0;
    }
    body {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 16px;
    }
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-area .company { font-size: 22px; font-weight: 700; color: var(--primary); }
    .logo-area .system  { font-size: 14px; color: var(--sub); margin-top: 4px; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 36px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .card h2 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    input:focus { border-color: var(--accent); }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn-login:hover { background: #2563eb; }
    .notice {
      margin-top: 20px;
      padding: 12px 16px;
      background: #eff6ff;
      border-radius: 8px;
      border-left: 3px solid var(--accent);
      font-size: 12px;
      color: var(--sub);
      line-height: 1.6;
    }
    .error-msg {
      font-size: 12px;
      color: var(--danger);
      margin-top: -12px;
      margin-bottom: 12px;
      display: none;
    }
    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--sub);
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo-area">
      <div class="company">(주)엑스티</div>
      <div class="system">OJT 평가 시스템</div>
    </div>
    <div class="card">
      <h2>로그인</h2>
      <form onsubmit="handleLogin(event)">
        <label>사원번호</label>
        <input type="text" id="emp-id" placeholder="사원번호를 입력하세요" autocomplete="off">
        <label>비밀번호</label>
        <input type="password" id="password" placeholder="비밀번호를 입력하세요">
        <p class="error-msg" id="error-msg">승인되지 않은 계정이거나 비밀번호가 올바르지 않습니다.</p>
        <button type="submit" class="btn-login">로그인</button>
      </form>
      <div class="notice">
        ※ 관리자가 사전 승인한 신입사원만 응시 가능합니다.<br>
        ※ 로그인 문제는 인사팀에 문의하세요.<br>
        ※ 시험 종료 후 모든 응시 데이터는 자동 삭제됩니다.
      </div>
    </div>
    <div class="footer-note">보안 문의: 인사팀 내선 000</div>
  </div>
  <script>
    function handleLogin(e) {
      e.preventDefault();
      const id = document.getElementById('emp-id').value.trim();
      const pw = document.getElementById('password').value;
      if (!id || !pw) {
        document.getElementById('error-msg').style.display = 'block';
        return;
      }
      // TODO: POST /api/auth/login 연동
      // mock: admin 계정이면 admin.html, 그 외 exam.html로 이동
      if (id === 'admin001') {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'exam.html?emp=' + encodeURIComponent(id);
      }
    }
  </script>
</body>
</html>
